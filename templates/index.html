<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI Duel - Pro</title>
    
    <!-- CSS Thư viện & Custom -->
    <link rel="stylesheet" href="/static/css/chessboard.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>♟️ Chess AI Duel: Professional Edition</h1>
    <div id="status">Sẵn sàng!</div>
    
    <div id="main-layout">
        <!-- 1. THANH ĐÁNH GIÁ DỌC (EVAL BAR) - Mép trái bàn cờ -->
        <div id="eval-bar-container">
            <div id="eval-bar-fill"></div>
            <span id="eval-text">0.0</span>
        </div>

        <!-- 2. BÀN CỜ -->
        <div id="board-container">
            <div id="board"></div>
        </div>

        <!-- 3. BIÊN BẢN VÁN CỜ (MOVE HISTORY) -->
        <div id="history-container">
            <h3>📝 Biên bản ván cờ</h3>
            <div id="moves-list">
                <!-- Nước đi tự động thêm vào đây -->
            </div>
        </div>

        <!-- 4. BẢNG ĐIỀU KHIỂN -->
        <aside id="controls-panel">
            <div class="control-group">
                <h3 class="side-white">⚪ Quân TRẮNG</h3>
                <select id="white-role">
                    <option value="human">Người chơi</option>
                    <option value="dummy">Bot: Dummy</option>
                    <option value="alpha_beta">Bot: Alpha-Beta</option>
                    <option value="mcts">Bot: MCTS</option>
                </select>
            </div>

            <div class="control-group">
                <h3 class="side-black">⚫ Quân ĐEN</h3>
                <select id="black-role">
                    <option value="human">Người chơi</option>
                    <option value="dummy" selected>Bot: Dummy</option>
                    <option value="alpha_beta">Bot: Alpha-Beta</option>
                    <option value="mcts">Bot: MCTS</option>
                </select>
            </div>

            <div class="action-buttons">
                <button id="start-btn" class="primary-btn">▶ Bắt đầu</button>
                <button id="pause-btn" class="danger-btn" style="display:none;">⏸ Tạm dừng</button>
                <button id="reset-btn" class="secondary-btn">🔄 Chơi mới</button>
            </div>

            <div class="bot-stats">
                <h3>🤖 Thông số AI</h3>
                <p>Nghĩ: <span id="thinking-time">0</span>s</p>
                <p>Nodes: <span id="nodes-count">0</span></p>
            </div>
        </aside>
    </div>

    <!-- SCRIPTS -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/chessboard.min.js"></script>
    <script src="/static/js/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
