<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI Duel - Pro</title>
    <link rel="stylesheet" href="/static/css/chessboard.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Chess Bot Simulator</h1>
    <div id="status">Sẵn sàng!</div>
    
    <div id="main-layout">
        <div id="eval-bar-container">
            <div id="eval-bar-fill"></div>
            <span id="eval-text">0.0</span>
        </div>

        <div id="board-container">
            <div id="board"></div>
        </div>

        <div id="history-container">
            <h3>📝 Biên bản ván cờ</h3>
            <div id="moves-list"></div>
        </div>

        <aside id="controls-panel">
            <div class="control-group">
                <h3 class="side-white">⚪ Quân TRẮNG</h3>
                <select id="white-role">
                    <option value="human">Người chơi</option>
                    <option value="dummy">Bot: Dummy (Random)</option>
                    <option value="stockfish">Bot: Stockfish</option>
                </select>
            </div>

            <div class="control-group">
                <h3 class="side-black">⚫ Quân ĐEN</h3>
                <select id="black-role">
                    <option value="human">Người chơi</option>
                    <option value="dummy" selected>Bot: Dummy (Random)</option>
                    <option value="stockfish">Bot: Stockfish</option>
                </select>
            </div>

            <div class="action-buttons">
                <button id="start-btn" class="primary-btn">▶ Bắt đầu</button>
                <button id="pause-btn" class="danger-btn" style="display:none;">⏸ Tạm dừng</button>
                <button id="reset-btn" class="secondary-btn">🔄 Chơi mới</button>
            </div>

            <div class="control-group">
                <h3>AI Delay</h3>
                <div class="inline-control">
                    <input id="ai-delay-input" type="number" min="0" max="10" step="0.1" value="0.5">
                    <button id="apply-delay-btn" class="secondary-btn" type="button">Cap nhat</button>
                </div>
                <p id="ai-delay-message" class="control-hint">Ap dung realtime cho luot AI ke tiep.</p>
            </div>

            <div class="bot-stats">
                <h3>🤖 Thông số AI</h3>
                <p>Nghĩ: <span id="thinking-time">0</span>s</p>
                <p>Nodes: <span id="nodes-count">0</span></p>
            </div>
        </aside>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/chessboard.min.js"></script>
    <script src="/static/js/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
